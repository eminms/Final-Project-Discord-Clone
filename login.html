<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Discord Clone</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Formları gizlətmək üçün köməkçi klass */
        .hidden { display: none; }
        .error-msg { color: #DA373C; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            
            <div class="login-header">
                <h2 id="page-title">Xoş Gəldiniz!</h2>
                <p id="page-subtitle">Sizi yenidən görməyə şadıq!</p>
            </div>

            <div id="login-form">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="login-email" required>
                </div>

                <div class="form-group">
                    <label>ŞİFRƏ</label>
                    <input type="password" id="login-password" required>
                    <a href="#" class="forgot-pass">Şifrəni unutmusan?</a>
                    <div class="error-msg" id="login-error">Email və ya şifrə yanlışdır!</div>
                </div>

                <button class="btn-login" onclick="handleLogin()">Giriş Et</button>

                <div class="register-text">
                    Hesabın yoxdur? <a href="#" onclick="toggleMode()">Qeydiyyatdan keç</a>
                </div>
            </div>

            <div id="register-form" class="hidden">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="reg-email" required>
                </div>

                <div class="form-group">
                    <label>İSTİFADƏÇİ ADI (GÖRÜNƏN AD)</label>
                    <input type="text" id="reg-username" required>
                </div>

                <div class="form-group">
                    <label>ŞİFRƏ</label>
                    <input type="password" id="reg-password" required>
                </div>

                <div class="form-group">
                    <label>ŞİFRƏNİ TƏSDİQLƏ</label>
                    <input type="password" id="reg-confirm" required>
                    <div class="error-msg" id="reg-error"></div>
                </div>

                <button class="btn-login" onclick="handleRegister()">Davam Et</button>

                <div class="register-text">
                    Artıq hesabın var? <a href="#" onclick="toggleMode()">Giriş et</a>
                </div>
            </div>

        </div>

        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=DiscordClone" alt="QR Code">
            <h3>QR Kodla giriş</h3>
            <p>Mobil tətbiq ilə skan edərək <br> dərhal daxil ol.</p>
        </div>
    </div>

    <script>

// TOKENİN İÇİNİ OXUYAN FUNKSİYA
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        return null;
    }
}

        // --- 1. MODE DƏYİŞMƏK (Login <-> Register) ---
        function toggleMode() {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            
            // Xətaları təmizləyək
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.value = '');

            if (loginForm.style.display === "none") {
                // Login-ə qayıt
                loginForm.style.display = "block";
                regForm.style.display = "none";
                title.innerText = "Xoş Gəldiniz!";
                subtitle.innerText = "Sizi yenidən görməyə şadıq!";
            } else {
                // Register-ə keç
                loginForm.style.display = "none";
                regForm.style.display = "block";
                title.innerText = "Hesab Yarat";
                subtitle.innerText = "Dostların səni gözləyir!";
            }
        }

        // --- 2. QEYDİYYAT MƏNTİQİ (API İLƏ) ---
async function handleRegister() {
    const email = document.getElementById('reg-email').value;
    const username = document.getElementById('reg-username').value;
    const pass = document.getElementById('reg-password').value;
    const confirmPass = document.getElementById('reg-confirm').value;
    const errorBox = document.getElementById('reg-error');

    if (!email || !username || !pass || !confirmPass) {
        errorBox.innerText = "Bütün xanaları doldurun!";
        errorBox.style.display = "block";
        return;
    }

    if (pass !== confirmPass) {
        errorBox.innerText = "Şifrələr eyni deyil!";
        errorBox.style.display = "block";
        return;
    }

    try {
        // BACK-END-Ə MƏLUMAT GÖNDƏRİRİK
        const response = await fetch("https://localhost:7203/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: pass
            })
        });

        if (response.ok) {
            alert("Qeydiyyat uğurludur! İndi giriş edə bilərsiniz.");
            toggleMode(); // Login səhifəsinə atır
        } else {
            const errorData = await response.json();
            // C#-dan gələn xətanı göstəririk
            errorBox.innerText = errorData[0]?.description || "Qeydiyyat zamanı xəta baş verdi.";
            errorBox.style.display = "block";
        }
    } catch (error) {
        errorBox.innerText = "Serverlə əlaqə qurula bilmədi. Back-end işləyir?";
        errorBox.style.display = "block";
    }
}

// --- 3. GİRİŞ MƏNTİQİ (API İLƏ) ---
async function handleLogin() {
    const email = document.getElementById('login-email').value; // Səndə input type email-dir, amma username gözləyirik. Fərqi yoxdur.
    const pass = document.getElementById('login-password').value;
    const errorBox = document.getElementById('login-error');

    if (!email || !pass) {
        errorBox.innerText = "Xanaları doldurun!";
        errorBox.style.display = "block";
        return;
    }

    try {
        // BACK-END-Ə GİRİŞ İSTƏYİ GÖNDƏRİRİK
        const response = await fetch("https://localhost:7203/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email, // API email gözləyir
                password: pass
            })
        });

      if (response.ok) {
    const data = await response.json();
    
    // 1. Tokeni yaddaşa yazırıq
    localStorage.setItem("token", data.token);
    localStorage.setItem("isLoggedIn", "true");
    
    // 2. Tokenin içini oxuyuruq
    const decodedToken = parseJwt(data.token);
    
    // 3. C#-ın içinə qoyduğu əsl username-i tapırıq (.NET adətən uzun adla saxlayır)
    let realUsername = email; // Tapmasa, çökməsin deyə ehtiyat üçün email qalır
    if (decodedToken) {
        realUsername = decodedToken["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] 
                    || decodedToken.unique_name 
                    || decodedToken.name 
                    || email;
    }
    
    // 4. Əsl username-i yaddaşa yazırıq!
    localStorage.setItem("username", realUsername); 
    
    window.location.href = "index.html"; // Uğurlu giriş!
}
        else {
            const errorData = await response.json();
            errorBox.innerText = errorData.message || "İstifadəçi adı və ya şifrə yanlışdır!";
            errorBox.style.display = "block";
        }
    } catch (error) {
        errorBox.innerText = "Serverlə əlaqə qurula bilmədi. Back-end işləyir?";
        errorBox.style.display = "block";
    }
}
    </script>
</body>
</html>
